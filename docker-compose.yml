services:
  app:
    image: bruckabey/vgrip:latest
    # build: .
    container_name: vgrip-app

    env_file:
      - stack.env

    environment:
      # Inside the compose network, "localhost" would point at the app
      # container itself, so override the host-oriented URL from .env.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vgrip

    # only for dev
    # volumes:
    #   - .:/app
    #   - /app/node_modules

    depends_on:
      postgres:
        condition: service_healthy

    # has been replaced by entrypoint.sh in dockerfile
    # command: npm run start

  postgres:
    image: postgres:16

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    container_name: vgrip-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vgrip

    ports:
      # Host port 5433 because a native Windows PostgreSQL service
      # already occupies 5432 on this machine.
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
